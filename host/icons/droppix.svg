<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19c3b1"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b3b39"/>
      <stop offset="1" stop-color="#0f4f4a"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- tablet body (landscape), white with a dark-teal screen -->
  <rect x="96" y="120" width="320" height="232" rx="30" fill="#ffffff"/>
  <rect x="120" y="146" width="272" height="180" rx="14" fill="url(#screen)"/>

  <!-- "drop" teardrop, teal, sitting on the screen -->
  <path d="M256 168
           C 314 244, 314 300, 256 314
           C 198 300, 198 244, 256 168 Z"
        fill="#19c3b1"/>
  <circle cx="238" cy="270" r="14" fill="#7ff0e3" opacity="0.85"/>

  <!-- tablet stand / base hint -->
  <rect x="232" y="352" width="48" height="20" rx="6" fill="#ffffff"/>
  <rect x="188" y="372" width="136" height="16" rx="8" fill="#ffffff"/>
</svg>
